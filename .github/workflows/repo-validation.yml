name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout routing repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-techniques
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-techniques
          ref: dd6316204b4c456a89c8f9647c5125c6cb1d01b4
          path: aoa-techniques

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          ref: e54b8294c689b8efd109cf222514c106369e3f8d
          path: aoa-skills

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          ref: d0fe7d0aed99b08398badd239d4ec5b97b2db382
          path: aoa-evals

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          ref: 9209090430d38c8f2faefcdf8e5cc2e67abc94e2
          path: aoa-memo

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          ref: c3fdb815bd652d9610124bddf7d1838d4081708b
          path: aoa-agents

      - name: Checkout Agents-of-Abyss
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Agents-of-Abyss
          ref: 95e218354928d234f80e2288b0c5442b3ddfebf0
          path: Agents-of-Abyss

      - name: Checkout aoa-playbooks
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: c39c46f93ba1a2c687d46c7dc2745461f864e02f
          path: aoa-playbooks

      - name: Checkout aoa-kag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-kag
          ref: 122d1b12155f5b0b0559ca5705e2ac9eef990a9c
          path: aoa-kag

      - name: Checkout Tree-of-Sophia
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Tree-of-Sophia
          ref: 36d3358b54b23469b2e429eb00cdb1f425737f08
          path: Tree-of-Sophia

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate routing surfaces
        run: |
          python scripts/validate_router.py \
            --techniques-root ./aoa-techniques \
            --skills-root ./aoa-skills \
            --evals-root ./aoa-evals \
            --memo-root ./aoa-memo \
            --agents-root ./aoa-agents \
            --aoa-root ./Agents-of-Abyss \
            --playbooks-root ./aoa-playbooks \
            --kag-root ./aoa-kag \
            --tos-root ./Tree-of-Sophia

      - name: Check rebuild parity
        run: |
          python scripts/build_router.py \
            --techniques-root ./aoa-techniques \
            --skills-root ./aoa-skills \
            --evals-root ./aoa-evals \
            --memo-root ./aoa-memo \
            --agents-root ./aoa-agents \
            --aoa-root ./Agents-of-Abyss \
            --playbooks-root ./aoa-playbooks \
            --kag-root ./aoa-kag \
            --tos-root ./Tree-of-Sophia \
            --check

      - name: Run routing tests
        run: pytest tests
