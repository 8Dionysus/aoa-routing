name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout routing repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-techniques
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-techniques
          ref: 9cd5eecea303403f69a582be071cf2cad74bd1b8
          path: aoa-techniques

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          ref: 139820c92658476bf9548ea404478e4b6e0b4798
          path: aoa-skills

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          ref: e18b26047919a65319607fa0e3f66a4b06df0761
          path: aoa-evals

      - name: Checkout aoa-stats
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-stats
          ref: 4a1ba30df8dc6cfb510d1f717d69561dde646e82
          path: aoa-stats

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          ref: e8a761bff4e4ed90c6b1ec6b321993a914b6b7dd
          path: aoa-memo

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          ref: 730f74d1b7174112742a2103161401713edacea2
          path: aoa-agents

      - name: Checkout Agents-of-Abyss
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Agents-of-Abyss
          ref: 88dc386a28083ccaa00a4ea4e7f0c78e8d1d244f
          path: Agents-of-Abyss

      - name: Checkout aoa-playbooks
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: c9207ccc85e8b6d8ecd8e41ef37b351a23a98e59
          path: aoa-playbooks

      - name: Checkout aoa-kag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-kag
          ref: aaee7cb92c0885cf39c56c7fcb755dccd1c91507
          path: aoa-kag

      - name: Checkout Tree-of-Sophia
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Tree-of-Sophia
          ref: 7eda6210d48f34457c234f15f90434a54f48376d
          path: Tree-of-Sophia

      - name: Checkout aoa-sdk
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-sdk
          ref: ab4446e031804e2dab532456b43162bcff98cb1c
          path: aoa-sdk

      - name: Checkout Dionysus
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Dionysus
          ref: 189d73e16f3faf821505b181a07e25353f3a6127
          path: Dionysus

      - name: Checkout 8Dionysus
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/8Dionysus
          ref: 4d75f708cc3d6846e1fe8ce1eb4dcf0fe4b453fc
          path: 8Dionysus

      - name: Checkout abyss-stack
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/abyss-stack
          ref: 1d51643220da54f6fc1d8390b74326f65c30f6bf
          path: abyss-stack

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate routing surfaces
        run: |
          python scripts/validate_router.py \
            --techniques-root ./aoa-techniques \
            --skills-root ./aoa-skills \
            --evals-root ./aoa-evals \
            --stats-root ./aoa-stats \
            --memo-root ./aoa-memo \
            --agents-root ./aoa-agents \
            --aoa-root ./Agents-of-Abyss \
            --playbooks-root ./aoa-playbooks \
            --kag-root ./aoa-kag \
            --tos-root ./Tree-of-Sophia \
            --sdk-root ./aoa-sdk \
            --seed-root ./Dionysus \
            --profile-root ./8Dionysus \
            --abyss-stack-root ./abyss-stack

      - name: Check rebuild parity
        run: |
          python scripts/build_router.py \
            --techniques-root ./aoa-techniques \
            --skills-root ./aoa-skills \
            --evals-root ./aoa-evals \
            --stats-root ./aoa-stats \
            --memo-root ./aoa-memo \
            --agents-root ./aoa-agents \
            --aoa-root ./Agents-of-Abyss \
            --playbooks-root ./aoa-playbooks \
            --kag-root ./aoa-kag \
            --tos-root ./Tree-of-Sophia \
            --sdk-root ./aoa-sdk \
            --seed-root ./Dionysus \
            --profile-root ./8Dionysus \
            --abyss-stack-root ./abyss-stack \
            --check

      - name: Run routing tests
        run: python -m pytest -q tests

      - name: Check wave-9 routing seam
        run: |
          python scripts/build_two_stage_skill_router.py \
            --routing-root . \
            --skills-root ./aoa-skills \
            --check
          python scripts/validate_two_stage_skill_router.py \
            --routing-root . \
            --skills-root ./aoa-skills
