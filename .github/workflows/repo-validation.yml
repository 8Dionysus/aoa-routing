name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Repo Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout routing repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Checkout aoa-techniques
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-techniques
          ref: df68b7ea550a719209492a3e8b75638815d09eb5
          path: aoa-techniques

      - name: Checkout aoa-skills
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-skills
          ref: 36f395460712d4e1b0ee144b60093cc6416344cb
          path: aoa-skills

      - name: Checkout aoa-evals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-evals
          ref: 026932ef222176833c5a667f97e63fb033a81621
          path: aoa-evals

      - name: Checkout aoa-stats
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-stats
          ref: 1ab992670f31fe9b33bf7bc864f34725e5c33e61
          path: aoa-stats

      - name: Checkout aoa-memo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-memo
          ref: e7c4702d5bff5b2e3add4c8ca5f7b3b34c3f9bfb
          path: aoa-memo

      - name: Checkout aoa-agents
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-agents
          ref: 9e9acb88fe274371ec6c33db20b422edc4d65753
          path: aoa-agents

      - name: Checkout Agents-of-Abyss
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Agents-of-Abyss
          ref: faf40353d1072f5873eb8a5dee4da817c9ec1356
          path: Agents-of-Abyss

      - name: Checkout aoa-playbooks
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: 211b21f93a34e33f41714534eb77b43ff25ee720
          path: aoa-playbooks

      - name: Checkout aoa-kag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-kag
          ref: 060f178e4946e25da9812da827274a6e42a6395a
          path: aoa-kag

      - name: Checkout Tree-of-Sophia
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Tree-of-Sophia
          ref: 5567c850b4901009ff3cc89834c6b7cf0496fb82
          path: Tree-of-Sophia

      - name: Checkout aoa-sdk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-sdk
          ref: bd350c4d343139b3f49770747bac88e7e1a8c4bf
          path: aoa-sdk

      - name: Checkout Dionysus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Dionysus
          ref: 2df937a51f4fa4794eff63f11e726676a8c72dad
          path: Dionysus

      - name: Checkout 8Dionysus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/8Dionysus
          ref: f4979d2ac11dd629b8c37f7547c802ec5b50f1fa
          path: 8Dionysus

      - name: Checkout abyss-stack
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-stack
          ref: 9dc25b5db2aa77f77148e8ac23abb73903fc188b
          path: abyss-stack

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run release audit
        run: python scripts/release_check.py
