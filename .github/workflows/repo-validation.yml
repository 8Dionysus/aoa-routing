name: Release Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout routing repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-techniques
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-techniques
          ref: 86c3907005ba0cbf7f4931694b78b213463bcdfc
          path: aoa-techniques

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          ref: a7576ab057ca9be3ec3befc8e28b90bebe3b0d62
          path: aoa-skills

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          ref: 8d597343f0950f8ed0f38343dd55910468b61c90
          path: aoa-evals

      - name: Checkout aoa-stats
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-stats
          ref: 536b8b49bd15b9d3aa1c7af374b39b0335dbec47
          path: aoa-stats

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          ref: e513c2c83083f880b912c6aaac98f98bfdd9f5eb
          path: aoa-memo

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          ref: 6a245c0833b35dbb48b62fc02fa59259df2170b1
          path: aoa-agents

      - name: Checkout Agents-of-Abyss
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Agents-of-Abyss
          ref: f221e75c956c9ec10a543fc3f1fd15526fc8db9c
          path: Agents-of-Abyss

      - name: Checkout aoa-playbooks
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: d69ac10c53ed85d814e8d41d62f8951ed44a412f
          path: aoa-playbooks

      - name: Checkout aoa-kag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-kag
          ref: 1fa07ce6be4b13b0031faa9d87d838fc38968876
          path: aoa-kag

      - name: Checkout Tree-of-Sophia
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Tree-of-Sophia
          ref: 541e979482386b22b6349c90ff526f2c93253875
          path: Tree-of-Sophia

      - name: Checkout aoa-sdk
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-sdk
          ref: 74aea14f80d9b6986f12b6d0d52fadd8a0a82384
          path: aoa-sdk

      - name: Checkout Dionysus
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Dionysus
          ref: 48cdd8406f00953529789a142eedb25f3576ec20
          path: Dionysus

      - name: Checkout 8Dionysus
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/8Dionysus
          ref: 74d70b06d39412dc6bcd52ca618792a441cd4566
          path: 8Dionysus

      - name: Checkout abyss-stack
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/abyss-stack
          ref: 6f1998072e3713402777703ca0c3096f45cc7e09
          path: abyss-stack

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run release audit
        run: python scripts/release_check.py
