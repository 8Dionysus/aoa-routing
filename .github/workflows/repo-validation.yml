name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout routing repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-techniques
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-techniques
          ref: 5c6f0496edc3c2e74590baa35627c85fe58ef765
          path: aoa-techniques

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          ref: c0ae5fae80e2f8e234b560a3da913a34f9a8f616
          path: aoa-skills

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          ref: be8475bc5095b8797f736cfc8a60ef3d2a9e9d79
          path: aoa-evals

      - name: Checkout aoa-stats
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-stats
          ref: d5d2df835125e7f86dc05e8928246fc781f06272
          path: aoa-stats

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          ref: d7fbc8d6e8cec5e757170ef4355ae5afbdc9ab7d
          path: aoa-memo

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          ref: 071477bf240c7589d7446e9befe84393591a2a08
          path: aoa-agents

      - name: Checkout Agents-of-Abyss
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Agents-of-Abyss
          ref: e8c6b979e891bfc0064b6b3a9f02655ff859530a
          path: Agents-of-Abyss

      - name: Checkout aoa-playbooks
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: 1b5dc324d5bb5f643e23be98fd725ffc7160e5f2
          path: aoa-playbooks

      - name: Checkout aoa-kag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-kag
          ref: 1556b070052360301d8eba91a0e98547e75f3e46
          path: aoa-kag

      - name: Checkout Tree-of-Sophia
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/Tree-of-Sophia
          ref: a0e31efc55d12f1b62b3cbbf6309b64032336027
          path: Tree-of-Sophia

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate routing surfaces
        run: |
          python scripts/validate_router.py \
            --techniques-root ./aoa-techniques \
            --skills-root ./aoa-skills \
            --evals-root ./aoa-evals \
            --stats-root ./aoa-stats \
            --memo-root ./aoa-memo \
            --agents-root ./aoa-agents \
            --aoa-root ./Agents-of-Abyss \
            --playbooks-root ./aoa-playbooks \
            --kag-root ./aoa-kag \
            --tos-root ./Tree-of-Sophia

      - name: Check rebuild parity
        run: |
          python scripts/build_router.py \
            --techniques-root ./aoa-techniques \
            --skills-root ./aoa-skills \
            --evals-root ./aoa-evals \
            --stats-root ./aoa-stats \
            --memo-root ./aoa-memo \
            --agents-root ./aoa-agents \
            --aoa-root ./Agents-of-Abyss \
            --playbooks-root ./aoa-playbooks \
            --kag-root ./aoa-kag \
            --tos-root ./Tree-of-Sophia \
            --check

      - name: Run routing tests
        run: python -m pytest -q tests

      - name: Check wave-9 routing seam
        run: |
          python scripts/build_two_stage_skill_router.py \
            --routing-root . \
            --skills-root ./aoa-skills \
            --check
          python scripts/validate_two_stage_skill_router.py \
            --routing-root . \
            --skills-root ./aoa-skills
