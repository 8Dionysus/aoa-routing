name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Repo Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout routing repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check repo-local KAG index family
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@da9f50a581645b2173b99dbf771a63d447ec2fec
        with:
          history-ref: ${{ github.event.pull_request.base.sha || github.event.before || format('{0}^', github.sha) }}
          event-history-ref: ${{ github.event.pull_request.base.sha || github.event.before || format('{0}^', github.sha) }}

      - name: Checkout aoa-techniques
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-techniques
          ref: 50f14c92f12062a13274fb537a6a0478c0385da4
          path: aoa-techniques

      - name: Checkout aoa-skills
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-skills
          ref: 5c36e4cf1b996cacd70b63ecc7ec5ba13fcc57b5
          path: aoa-skills

      - name: Checkout aoa-evals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-evals
          ref: 5a1c410ef8cb4b692fad43adb65d2eecb2a1f639
          path: aoa-evals

      - name: Checkout aoa-stats
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-stats
          ref: d0b91f7f7ecb95e788714d7aacf3a9a3ef8412dc
          path: aoa-stats

      - name: Checkout aoa-memo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-memo
          ref: 79951a2a056c11a30602a71fb91236e2a2ba45bc
          path: aoa-memo

      - name: Checkout aoa-agents
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-agents
          ref: e3703f06c05dc4dab155e3ffafff9414de22649b
          path: aoa-agents

      - name: Checkout Agents-of-Abyss
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Agents-of-Abyss
          ref: ba0722f5b2cf3764cbdaffdcd6006a6963bad0a9
          path: Agents-of-Abyss

      - name: Checkout aoa-playbooks
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: 24c762868fbb257852d6ce0b03dd356566e2cfd1
          path: aoa-playbooks

      - name: Checkout aoa-kag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-kag
          ref: 7806d4c18890ebca2a01a3aaab5a6141de418129
          path: aoa-kag

      - name: Checkout Tree-of-Sophia
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Tree-of-Sophia
          ref: 84372b134e3c51d3033000125361e6adbb81c122
          path: Tree-of-Sophia

      - name: Checkout aoa-sdk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-sdk
          ref: a49420fc86133f78d554401c46e7d2230cdd7b1e
          path: aoa-sdk

      - name: Checkout Dionysus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Dionysus
          ref: aec93c763139f3574147e3f95adda7902791d2e0
          path: Dionysus

      - name: Checkout 8Dionysus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/8Dionysus
          ref: da16f337b09829d16a470cd5c8ba98dcba7b248c
          path: 8Dionysus

      - name: Checkout abyss-stack
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-stack
          ref: cc1b60521fbb950858a6773b945d20b6104ea387
          path: abyss-stack

      - name: Checkout abyss-machine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-machine
          ref: ca92c113594fcd22acc436be249e96ea629a282a
          path: abyss-machine

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run release audit
        env:
          ABYSS_MACHINE_REPO_ROOT: ./abyss-machine
          AOA_STATS_ROOT: ./aoa-stats
        run: python scripts/release_check.py
